spring.application.name=smart-finance-tracker
# Đổi cổng chạy server (phòng trường hợp cổng 8080 bị XAMPP/Tomcat chiếm)
server.port=8081

# Cấu hình kết nối MySQL của XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/smart_finance_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Cho phép Spring Boot tự động tạo/cập nhật bảng dựa trên code Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
